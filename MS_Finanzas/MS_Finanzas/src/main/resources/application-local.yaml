# Perfil local: base H2 en memoria (sin Supabase). Activar con:
# SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
spring:
  datasource:
    url: jdbc:h2:mem:finanzas;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
