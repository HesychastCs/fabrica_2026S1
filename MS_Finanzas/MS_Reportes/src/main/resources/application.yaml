spring:
  application:
    name: ms-reportes
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${REPORTES_DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=reportes}
    username: ${REPORTES_DB_USER:postgres}
    password: ${REPORTES_DB_PASSWORD:}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      idle-timeout: 10000
      max-lifetime: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: reportes
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

finanzas:
  api:
    base-url: ${FINANZAS_API_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${PORT:8081}
