spring:
  datasource:
    url: jdbc:h2:mem:reportes_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS reportes\;SET SCHEMA reportes
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: reportes
        dialect: org.hibernate.dialect.H2Dialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 1000
            read-timeout: 1000

finanzas:
  api:
    base-url: http://localhost:8080

eureka:
  client:
    enabled: false
