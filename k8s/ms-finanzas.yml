apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-finanzas
  labels:
    app: ms-finanzas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-finanzas
  template:
    metadata:
      labels:
        app: ms-finanzas
    spec:
      containers:
        - name: ms-finanzas
          image: localhost:5000/ms-finanzas:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # 1. Connect to Supabase using the secret
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: db-host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: db-port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: db-password
            - name: DB_SCHEMA
              value: "public"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION
              value: "86400000"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
---
# Expose the Kubernetes Service
apiVersion: v1
kind: Service
metadata:
  name: ms-finanzas
  labels:
    app: ms-finanzas
spec:
  type: LoadBalancer
  selector:
    app: ms-finanzas
  ports:
    - port: 8080
      targetPort: 8080
